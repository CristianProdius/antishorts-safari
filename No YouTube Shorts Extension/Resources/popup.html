<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #fff;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status {
      font-size: 13px;
      color: #aaa;
    }
    .status.active { color: #4caf50; }
    .status.inactive { color: #f44336; }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4caf50; }
    input:checked + .slider::before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h1>AntiShorts</h1>
  <div class="row">
    <span id="status" class="status active">Blocking Shorts</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
